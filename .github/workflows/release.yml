# Release (E-2): on a pushed `v*` tag, build the SIGNED + NOTARIZED Apple-silicon app on macos-14 and
# publish a (draft) GitHub Release with the `.dmg`.
#
# SCAFFOLD — the Apple Developer signing secrets are deliberately NOT in the repo (P0-2). A maintainer
# adds them as GitHub Actions secrets (see docs/RELEASE.md) before the first release. Until they exist the
# "Require signing secrets" guard FAILS the job, so an unsigned / un-notarized release can never be
# published by accident.
#
# tauri-action drives Tauri's bundler, which — from the APPLE_* env below — imports the cert into an
# ephemeral keychain, codesigns with the Developer ID identity (hardened runtime), builds the `.dmg`,
# notarizes via `notarytool`, and staples the ticket. The final step independently verifies the staple.
name: release

on:
  push:
    tags: ["v*"]

# Never run two release builds for the same tag at once; let an in-flight release finish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the GitHub Release + upload the .dmg

jobs:
  release:
    name: build + sign + notarize + publish (macos)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # Fail fast BEFORE building if any signing secret is missing — refuse to ship an unsigned release.
      # trmx-48: TAURI_SIGNING_PRIVATE_KEY is also required so every release carries a signed updater
      # artifact (the auto-updater can't verify unsigned updates). Its password is optional (a key may
      # have none), so it is NOT in the required list.
      - name: Require signing secrets (no unsigned releases)
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=()
          for v in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY \
                   APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID TAURI_SIGNING_PRIVATE_KEY; do
            if [ -z "${!v:-}" ]; then missing+=("$v"); fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required signing secrets: ${missing[*]}. See docs/RELEASE.md (Required GitHub Actions secrets). Refusing to build an unsigned / un-notarized release."
            exit 1
          fi
          echo "All required signing secrets are present."

      - name: Install the pinned toolchain (rust-toolchain.toml)
        run: rustup toolchain install "$(sed -nE 's/^channel = "([^"]+)".*/\1/p' rust-toolchain.toml)"
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
      - name: Bootstrap cargo-tauri (§2.4)
        run: cargo install tauri-cli --version 2.11.3 --locked

      # Identity + tag gate (E-2a): assert the pinned version / product name / bundle id AND that the
      # pushed tag is v<workspace_version> — so the published asset name (Termixion_<version>_aarch64.dmg,
      # derived from the crate version) can't disagree with a mismatched tag.
      - name: Release metadata + tag gate
        env:
          EXPECTED_TAG: ${{ github.ref_name }}
        run: bash scripts/check-release-metadata.sh

      # Build only (NO release inputs): tauri-action runs Tauri's bundler, which — from the APPLE_* env —
      # imports the cert into an ephemeral keychain, codesigns Developer ID (hardened runtime), builds the
      # .dmg, notarizes via notarytool, and staples. `--bundles dmg` overrides tauri.conf.json's local-only
      # `["app"]` target. We deliberately do NOT pass tagName here, so this step does NOT create a Release
      # or upload anything — we publish ONLY the verified .dmg below (a build also leaves a .app under
      # bundle/macos/, which must NOT be uploaded).
      # trmx-48: `--config tauri.updater.conf.json` is a RELEASE-ONLY overlay that turns on
      # `createUpdaterArtifacts` and supplies the updater endpoint + pubkey. It is applied ONLY here, so the
      # default `cargo tauri build --debug` that ci.yml runs needs no signing key and stays green. The
      # TAURI_SIGNING_PRIVATE_KEY(+password) env signs the produced updater artifact.
      - name: Build, sign + notarize (tauri-action — build only)
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/termixion-tauri
          args: --bundles dmg --config tauri.updater.conf.json

      # Independently prove the artifact is notarized + stapled BEFORE publishing — catches a silent
      # signing/notarization gap that would otherwise ship a Gatekeeper-blocked dmg. Exposes the verified
      # .dmg path so the publish step uploads exactly that one file.
      - name: Verify notarization (stapler + Gatekeeper)
        id: verify
        run: |
          set -euo pipefail
          dmg=$(find target -name 'Termixion_*_aarch64.dmg' -print -quit)
          if [ -z "$dmg" ]; then echo "::error::no .dmg was produced under target/"; exit 1; fi
          echo "verifying: $dmg"
          xcrun stapler validate "$dmg"
          spctl --assess --type open --context context:primary-signature -vvv "$dmg"
          echo "dmg=$dmg" >> "$GITHUB_OUTPUT"

      # trmx-48: assemble the updater manifest (latest.json) from the signed updater artifact so the
      # in-app auto-updater (endpoint = releases/latest/download/latest.json) can find and verify updates.
      # The .app.tar.gz + its .sig are produced by createUpdaterArtifacts (the release-only overlay above).
      - name: Assemble updater manifest (latest.json)
        id: updater
        run: |
          set -euo pipefail
          artifact=$(find target -name '*.app.tar.gz' -print -quit)
          sig=$(find target -name '*.app.tar.gz.sig' -print -quit)
          if [ -z "$artifact" ] || [ -z "$sig" ]; then
            echo "::error::updater artifact/signature not found under target/ (createUpdaterArtifacts must be on)."
            exit 1
          fi
          version="${GITHUB_REF_NAME#v}"
          url="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$(basename "$artifact")"
          pub_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          jq -n --arg version "$version" --arg pub_date "$pub_date" \
                --arg sig "$(cat "$sig")" --arg url "$url" \
            '{version: $version, pub_date: $pub_date,
              platforms: {"darwin-aarch64": {signature: $sig, url: $url}}}' > latest.json
          echo "artifact=$artifact" >> "$GITHUB_OUTPUT"
          echo "manifest=latest.json" >> "$GITHUB_OUTPUT"
          echo "wrote latest.json for $version"

      # Publish a DRAFT release with the verified .dmg PLUS the signed updater artifact + latest.json.
      # Draft so a human signs off on the first signed build; flip to a direct publish once you trust the
      # flow. Re-running an existing tag: delete the prior draft Release first (gh release create won't
      # clobber). latest.json must be an asset so the fixed endpoint resolves.
      #
      # trmx-48: NOT a prerelease. The in-app updater endpoint is `releases/latest/download/latest.json`,
      # and GitHub's `/releases/latest` resolves only to the newest *full* (non-prerelease) published
      # release — a prerelease would never be found. So update-bearing alpha builds ship as full releases
      # (the `--draft` gate still holds them for human sign-off until published). See docs/RELEASE.md.
      - name: Publish draft release (verified .dmg + updater artifact + latest.json)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "${{ github.ref_name }}" \
            "${{ steps.verify.outputs.dmg }}" \
            "${{ steps.updater.outputs.artifact }}" \
            "${{ steps.updater.outputs.manifest }}" \
            --draft \
            --title "Termixion ${{ github.ref_name }}" \
            --notes "Signed + notarized Apple-silicon build. Download the .dmg below. Auto-update artifacts (latest.json) are attached. (Alpha — see CHANGELOG.md.)"
