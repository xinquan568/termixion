# Release (E-2): on a pushed `v*` tag, build the Apple-silicon app on macos-14 AND the x86_64 Linux
# AppImage/.deb on ubuntu-22.04 (trmx-102, FR-1.7), then publish ONE (draft) GitHub Release with both
# platforms' installers + updater artifacts + a merged latest.json.
#
# SIGNING IS DUAL-MODE (trmx-49), decided by the "Signing mode" gate from the Apple secrets alone:
#   - ALL six APPLE_* secrets → signed + notarized + stapled macOS build (independently verified).
#   - NONE                    → DELIBERATE unsigned personal-alpha macOS build (0.0.x).
#   - a PARTIAL set           → fail fast — a half-configured release is never shipped.
# TAURI_SIGNING_PRIVATE_KEY is ALWAYS required so the auto-updater can verify every update artifact (the
# SAME minisign key signs both the macOS .app.tar.gz and the Linux .AppImage.tar.gz — trmx-102).
#
# Three jobs so Linux never races the macOS publish (each build UPLOADS artifacts; `publish` NEEDS both,
# downloads them, assembles the two-platform latest.json, and creates the release exactly once).
name: release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the GitHub Release + upload the installers

jobs:
  build-macos:
    name: build macos (signs + notarizes when configured)
    runs-on: macos-14
    outputs:
      signed: ${{ steps.mode.outputs.signed }}
    steps:
      - uses: actions/checkout@v4

      # Decide the signing mode BEFORE building (fail fast on a bad config). trmx-49: unsigned is a
      # DELIBERATE state (zero Apple secrets). TAURI_SIGNING_PRIVATE_KEY is required in BOTH modes.
      - name: Signing mode (all six Apple secrets = signed; none = unsigned alpha; partial = fail)
        id: mode
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is missing — every release must ship a verifiable (signed) updater artifact. See docs/RELEASE.md (Auto-update)."
            exit 1
          fi
          missing=(); n_present=0
          for v in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY \
                   APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -n "${!v:-}" ]; then n_present=$((n_present + 1)); else missing+=("$v"); fi
          done
          if [ ${#missing[@]} -eq 0 ]; then
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "All six Apple signing secrets present — SIGNED + notarized release."
          elif [ "$n_present" -eq 0 ]; then
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Apple signing secrets — deliberate UNSIGNED personal-alpha build (trmx-49)."
          else
            echo "::error::Partial Apple signing config — missing: ${missing[*]}. Set ALL six or NONE."
            exit 1
          fi

      - name: Install the pinned toolchain (rust-toolchain.toml)
        run: rustup toolchain install "$(sed -nE 's/^channel = "([^"]+)".*/\1/p' rust-toolchain.toml)"
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
      - name: Bootstrap cargo-tauri (§2.4)
        run: cargo install tauri-cli --version 2.11.3 --locked

      - name: Release metadata + tag gate
        env:
          EXPECTED_TAG: ${{ github.ref_name }}
        run: bash scripts/check-release-metadata.sh

      # --bundles app,dmg overrides tauri.conf's local-only ["app"]; the app target is EXPLICIT so the
      # updater artifacts (.app.tar.gz+.sig) are produced. Two mode-gated copies: the unsigned build must
      # NOT export APPLE_* at all (the bundler keys off variable presence).
      - name: Build, sign + notarize (tauri-action — signed mode)
        if: steps.mode.outputs.signed == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/termixion-tauri
          args: --bundles app,dmg --config tauri.updater.conf.json

      - name: Build (tauri-action — unsigned personal-alpha mode, trmx-49)
        if: steps.mode.outputs.signed == 'false'
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/termixion-tauri
          args: --bundles app,dmg --config tauri.updater.conf.json

      # Signed: prove notarized + stapled BEFORE publishing. Unsigned: assert existence + log the ad-hoc sig.
      - name: Verify artifact (stapler + Gatekeeper when signed; existence when unsigned)
        env:
          SIGNED: ${{ steps.mode.outputs.signed }}
        run: |
          set -euo pipefail
          dmg=$(find target -name 'Termixion_*_aarch64.dmg' -print -quit)
          if [ -z "$dmg" ]; then echo "::error::no .dmg was produced under target/"; exit 1; fi
          echo "verifying: $dmg"
          if [ "$SIGNED" = "true" ]; then
            xcrun stapler validate "$dmg"
            spctl --assess --type open --context context:primary-signature -vvv "$dmg"
          else
            echo "::notice::UNSIGNED personal-alpha build — skipping stapler/spctl. Gatekeeper will block until approved by hand."
            codesign -dvv "$dmg" 2>&1 || true
          fi

      # Stage exactly the files publish needs into one dir, then upload as an artifact (no publish here).
      - name: Stage + upload macOS artifacts
        run: |
          set -euo pipefail
          mkdir -p dist-macos
          cp "$(find target -name 'Termixion_*_aarch64.dmg' -print -quit)" dist-macos/
          cp "$(find target -name '*.app.tar.gz' -print -quit)" dist-macos/
          cp "$(find target -name '*.app.tar.gz.sig' -print -quit)" dist-macos/
      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: dist-macos/
          if-no-files-found: error

  build-linux:
    name: build linux (x86_64 AppImage + .deb)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri Linux system deps (webkit2gtk 4.1 + gtk)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            build-essential curl wget file libssl-dev libxdo-dev
      - name: Install the pinned toolchain (rust-toolchain.toml)
        run: rustup toolchain install "$(sed -nE 's/^channel = "([^"]+)".*/\1/p' rust-toolchain.toml)"
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
      - name: Bootstrap cargo-tauri (§2.4)
        run: cargo install tauri-cli --version 2.11.3 --locked
      - name: Release metadata + tag gate
        env:
          EXPECTED_TAG: ${{ github.ref_name }}
        run: bash scripts/check-release-metadata.sh

      # The SAME minisign key signs the Linux updater tarball. appimage is updater-enabled (produces the
      # .AppImage.tar.gz+.sig); deb is install-only.
      - name: Build (tauri-action — appimage + deb, signed updater tarball)
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/termixion-tauri
          args: --bundles appimage,deb --config tauri.updater.conf.json

      - name: Validate the .deb dependency metadata
        run: |
          set -euo pipefail
          deb=$(find target -name '*.deb' -print -quit)
          if [ -z "$deb" ]; then echo "::error::no .deb produced under target/"; exit 1; fi
          echo "inspecting: $deb"
          # Capture each dpkg-deb output ONCE, then grep the captured text via a here-string. Piping
          # `dpkg-deb ... | grep -q` is unsafe under `set -o pipefail`: grep -q exits at the first match
          # and closes the pipe, dpkg-deb's tar subprocess then hits a write error and exits non-zero, and
          # pipefail promotes that to the pipeline's status — a false "missing" failure on a good .deb
          # (trmx-137). A here-string has no upstream producer to SIGPIPE, so the guard is faithful.
          info="$(dpkg-deb -I "$deb")"             # control + Depends must be present + sane
          printf '%s\n' "$info"
          grep -qi '^ Depends:' <<<"$info" || { echo "::error::.deb has no Depends"; exit 1; }
          # Contents must carry the actual payload, not just metadata (a mispackaged .deb would else pass).
          contents="$(dpkg-deb --contents "$deb")"
          printf '%s\n' "$contents"
          grep -q 'usr/bin/termixion' <<<"$contents" || { echo "::error::.deb is missing usr/bin/termixion"; exit 1; }
          grep -q '\.desktop' <<<"$contents" || { echo "::error::.deb is missing the .desktop entry"; exit 1; }

      - name: Stage + upload Linux artifacts
        run: |
          set -euo pipefail
          mkdir -p dist-linux
          cp "$(find target -name '*.AppImage' -print -quit)" dist-linux/
          cp "$(find target -name '*.AppImage.tar.gz' -print -quit)" dist-linux/
          cp "$(find target -name '*.AppImage.tar.gz.sig' -print -quit)" dist-linux/
          cp "$(find target -name '*.deb' -print -quit)" dist-linux/
      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: dist-linux/
          if-no-files-found: error

  publish:
    name: publish draft release (both platforms + merged latest.json)
    needs: [build-macos, build-linux]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist-macos
          path: dist-macos
      - uses: actions/download-artifact@v4
        with:
          name: dist-linux
          path: dist-linux

      # Assemble ONE latest.json carrying BOTH platform entries (only after both artifact sets exist).
      # The SAME minisign key signed both; verify each signature is present + non-empty.
      - name: Assemble merged updater manifest (latest.json — darwin-aarch64 + linux-x86_64)
        id: updater
        run: |
          set -euo pipefail
          mac_art=$(find dist-macos -name '*.app.tar.gz' -print -quit)
          mac_sig=$(find dist-macos -name '*.app.tar.gz.sig' -print -quit)
          lin_art=$(find dist-linux -name '*.AppImage.tar.gz' -print -quit)
          lin_sig=$(find dist-linux -name '*.AppImage.tar.gz.sig' -print -quit)
          for f in "$mac_art" "$mac_sig" "$lin_art" "$lin_sig"; do
            if [ -z "$f" ] || [ ! -s "$f" ]; then echo "::error::missing/empty updater artifact or signature: '$f'"; exit 1; fi
          done
          base="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}"
          version="${GITHUB_REF_NAME#v}"
          pub_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          jq -n --arg version "$version" --arg pub_date "$pub_date" \
                --arg msig "$(cat "$mac_sig")" --arg murl "$base/$(basename "$mac_art")" \
                --arg lsig "$(cat "$lin_sig")" --arg lurl "$base/$(basename "$lin_art")" \
            '{version: $version, pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {signature: $msig, url: $murl},
                "linux-x86_64":   {signature: $lsig, url: $lurl}
              }}' > latest.json
          echo "wrote latest.json for $version (darwin-aarch64 + linux-x86_64)"

      - name: Publish draft release (both installers + updater artifacts + latest.json)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGNED: ${{ needs.build-macos.outputs.signed }}
        run: |
          set -euo pipefail
          if [ "$SIGNED" = "true" ]; then
            notes="Signed + notarized macOS (aarch64) build + x86_64 Linux AppImage/.deb. Auto-update artifacts (latest.json, both platforms) attached. (Alpha — see CHANGELOG.md.)"
          else
            notes="UNSIGNED macOS (aarch64) personal-alpha build (trmx-49) — Gatekeeper will block it: approve under System Settings → Privacy & Security → \"Open Anyway\", or run \`xattr -d com.apple.quarantine /Applications/Termixion.app\`. Plus x86_64 Linux AppImage (\`chmod +x\` to run; on a FUSE-less host set \`APPIMAGE_EXTRACT_AND_RUN=1\`) + .deb. Auto-updates are signature-verified by the updater key (latest.json attached, both platforms). (Alpha — see CHANGELOG.md.)"
          fi
          gh release create "${{ github.ref_name }}" \
            dist-macos/*.dmg dist-macos/*.app.tar.gz dist-macos/*.app.tar.gz.sig \
            dist-linux/*.AppImage dist-linux/*.AppImage.tar.gz dist-linux/*.AppImage.tar.gz.sig dist-linux/*.deb \
            latest.json \
            --draft \
            --title "Termixion ${{ github.ref_name }}" \
            --notes "$notes"
