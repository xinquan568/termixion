# Release (E-2): on a pushed `v*` tag, build the Apple-silicon app on macos-14 and publish a (draft)
# GitHub Release with the `.dmg` + the signed updater artifacts.
#
# SIGNING IS DUAL-MODE (trmx-49), decided by the "Signing mode" gate from the Apple secrets alone:
#   - ALL six APPLE_* secrets → signed + notarized + stapled (independently verified by stapler/spctl).
#   - NONE                    → DELIBERATE unsigned personal-alpha build (0.0.x, audience = the
#                               maintainer); Gatekeeper blocks the download until approved by hand.
#   - a PARTIAL set           → fail fast — a half-configured release is never shipped.
# TAURI_SIGNING_PRIVATE_KEY is ALWAYS required so the auto-updater can verify every update artifact.
# Adding the six Apple secrets later upgrades the next tag to the signed path with no workflow edit
# (see docs/RELEASE.md, "Unsigned mode").
#
# In signed mode tauri-action drives Tauri's bundler, which — from the APPLE_* env — imports the cert
# into an ephemeral keychain, codesigns with the Developer ID identity (hardened runtime), builds the
# `.dmg`, notarizes via `notarytool`, and staples the ticket; the verify step then proves the staple.
name: release

on:
  push:
    tags: ["v*"]

# Never run two release builds for the same tag at once; let an in-flight release finish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the GitHub Release + upload the .dmg

jobs:
  release:
    name: build + package + publish (macos; signs + notarizes when configured)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # Decide the signing mode BEFORE building (fail fast on a bad config). trmx-49: unsigned is a
      # DELIBERATE state (zero Apple secrets) for the 0.0.x personal alpha — the original guarantee
      # ("never ship unsigned by ACCIDENT") survives as the all-or-nothing check: any partial Apple
      # config fails. trmx-48: TAURI_SIGNING_PRIVATE_KEY is required in BOTH modes so every release
      # carries a signed updater artifact (the auto-updater can't verify unsigned updates). Its
      # password is optional (a key may have none), so it is NOT in the required list.
      - name: Signing mode (all six Apple secrets = signed; none = unsigned alpha; partial = fail)
        id: mode
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is missing — every release must ship a verifiable (signed) updater artifact. See docs/RELEASE.md (Auto-update)."
            exit 1
          fi
          missing=(); n_present=0
          for v in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY \
                   APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -n "${!v:-}" ]; then n_present=$((n_present + 1)); else missing+=("$v"); fi
          done
          if [ ${#missing[@]} -eq 0 ]; then
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "All six Apple signing secrets present — SIGNED + notarized release."
          elif [ "$n_present" -eq 0 ]; then
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Apple signing secrets — deliberate UNSIGNED personal-alpha build (trmx-49). Gatekeeper will block the download until approved by hand; see docs/RELEASE.md (Unsigned mode)."
          else
            echo "::error::Partial Apple signing config — missing: ${missing[*]}. Set ALL six Apple secrets or NONE (see docs/RELEASE.md). Refusing a half-configured release."
            exit 1
          fi

      - name: Install the pinned toolchain (rust-toolchain.toml)
        run: rustup toolchain install "$(sed -nE 's/^channel = "([^"]+)".*/\1/p' rust-toolchain.toml)"
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
      - name: Bootstrap cargo-tauri (§2.4)
        run: cargo install tauri-cli --version 2.11.3 --locked

      # Identity + tag gate (E-2a): assert the pinned version / product name / bundle id AND that the
      # pushed tag is v<workspace_version> — so the published asset name (Termixion_<version>_aarch64.dmg,
      # derived from the crate version) can't disagree with a mismatched tag.
      - name: Release metadata + tag gate
        env:
          EXPECTED_TAG: ${{ github.ref_name }}
        run: bash scripts/check-release-metadata.sh

      # Build only (NO release inputs): tauri-action runs Tauri's bundler. `--bundles dmg` overrides
      # tauri.conf.json's local-only `["app"]` target. We deliberately do NOT pass tagName here, so this
      # step does NOT create a Release or upload anything — we publish ONLY the verified .dmg below (a
      # build also leaves a .app under bundle/macos/, which must NOT be uploaded).
      # trmx-48: `--config tauri.updater.conf.json` is a RELEASE-ONLY overlay that turns on
      # `createUpdaterArtifacts` and supplies the updater endpoint + pubkey. It is applied ONLY here, so the
      # default `cargo tauri build --debug` that ci.yml runs needs no signing key and stays green. The
      # TAURI_SIGNING_PRIVATE_KEY(+password) env signs the produced updater artifact.
      # trmx-49: TWO mode-gated copies of the step, because the unsigned build must not export the APPLE_*
      # env AT ALL — the bundler keys off variable PRESENCE, and an empty-but-set APPLE_CERTIFICATE would
      # make it attempt (and fail) the keychain import instead of skipping signing.
      - name: Build, sign + notarize (tauri-action — signed mode)
        if: steps.mode.outputs.signed == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/termixion-tauri
          args: --bundles dmg --config tauri.updater.conf.json

      - name: Build (tauri-action — unsigned personal-alpha mode, trmx-49)
        if: steps.mode.outputs.signed == 'false'
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/termixion-tauri
          args: --bundles dmg --config tauri.updater.conf.json

      # Signed mode: independently prove the artifact is notarized + stapled BEFORE publishing — catches a
      # silent signing/notarization gap that would otherwise ship a Gatekeeper-blocked dmg. Unsigned mode
      # (trmx-49): stapler/spctl would rightly fail, so only assert the .dmg exists and log its (ad-hoc)
      # signature state. Either way, exposes the .dmg path so the publish step uploads exactly that file.
      - name: Verify artifact (stapler + Gatekeeper when signed; existence when unsigned)
        id: verify
        env:
          SIGNED: ${{ steps.mode.outputs.signed }}
        run: |
          set -euo pipefail
          dmg=$(find target -name 'Termixion_*_aarch64.dmg' -print -quit)
          if [ -z "$dmg" ]; then echo "::error::no .dmg was produced under target/"; exit 1; fi
          echo "verifying: $dmg"
          if [ "$SIGNED" = "true" ]; then
            xcrun stapler validate "$dmg"
            spctl --assess --type open --context context:primary-signature -vvv "$dmg"
          else
            echo "::notice::UNSIGNED personal-alpha build — skipping stapler/spctl (they require notarization). Gatekeeper will block this dmg until approved by hand (docs/RELEASE.md, Unsigned mode)."
            codesign -dvv "$dmg" 2>&1 || true
          fi
          echo "dmg=$dmg" >> "$GITHUB_OUTPUT"

      # trmx-48: assemble the updater manifest (latest.json) from the signed updater artifact so the
      # in-app auto-updater (endpoint = releases/latest/download/latest.json) can find and verify updates.
      # The .app.tar.gz + its .sig are produced by createUpdaterArtifacts (the release-only overlay above).
      - name: Assemble updater manifest (latest.json)
        id: updater
        run: |
          set -euo pipefail
          artifact=$(find target -name '*.app.tar.gz' -print -quit)
          sig=$(find target -name '*.app.tar.gz.sig' -print -quit)
          if [ -z "$artifact" ] || [ -z "$sig" ]; then
            echo "::error::updater artifact/signature not found under target/ (createUpdaterArtifacts must be on)."
            exit 1
          fi
          version="${GITHUB_REF_NAME#v}"
          url="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$(basename "$artifact")"
          pub_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          jq -n --arg version "$version" --arg pub_date "$pub_date" \
                --arg sig "$(cat "$sig")" --arg url "$url" \
            '{version: $version, pub_date: $pub_date,
              platforms: {"darwin-aarch64": {signature: $sig, url: $url}}}' > latest.json
          echo "artifact=$artifact" >> "$GITHUB_OUTPUT"
          echo "manifest=latest.json" >> "$GITHUB_OUTPUT"
          echo "wrote latest.json for $version"

      # Publish a DRAFT release with the verified .dmg PLUS the signed updater artifact + latest.json.
      # Draft so a human signs off on the first signed build; flip to a direct publish once you trust the
      # flow. Re-running an existing tag: delete the prior draft Release first (gh release create won't
      # clobber). latest.json must be an asset so the fixed endpoint resolves.
      #
      # trmx-48: NOT a prerelease. The in-app updater endpoint is `releases/latest/download/latest.json`,
      # and GitHub's `/releases/latest` resolves only to the newest *full* (non-prerelease) published
      # release — a prerelease would never be found. So update-bearing alpha builds ship as full releases
      # (the `--draft` gate still holds them for human sign-off until published). See docs/RELEASE.md.
      - name: Publish draft release (verified .dmg + updater artifact + latest.json)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGNED: ${{ steps.mode.outputs.signed }}
        run: |
          set -euo pipefail
          if [ "$SIGNED" = "true" ]; then
            notes="Signed + notarized Apple-silicon build. Download the .dmg below. Auto-update artifacts (latest.json) are attached. (Alpha — see CHANGELOG.md.)"
          else
            notes="UNSIGNED Apple-silicon build (personal alpha, trmx-49) — macOS Gatekeeper will block it: after copying Termixion.app to /Applications, approve it under System Settings → Privacy & Security → \"Open Anyway\", or run \`xattr -d com.apple.quarantine /Applications/Termixion.app\`. Auto-updates remain signature-verified by the updater key (latest.json attached). (Alpha — see CHANGELOG.md.)"
          fi
          gh release create "${{ github.ref_name }}" \
            "${{ steps.verify.outputs.dmg }}" \
            "${{ steps.updater.outputs.artifact }}" \
            "${{ steps.updater.outputs.manifest }}" \
            --draft \
            --title "Termixion ${{ github.ref_name }}" \
            --notes "$notes"
