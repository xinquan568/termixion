# CI (E-1): the full gate. The `core-linux` job proves the platform-agnostic core builds + tests
# headless (R1) and `seam-guard` runs the required seam scan — both on cheap ubuntu runners; the macOS
# job runs the complete gate (fmt/clippy/lint, full workspace tests, frontend tests, the packaged-app
# `--smoke`, the Playwright webview test, and an advisory footprint). The product is macOS-only since
# v0.1.1 (trmx-187) — the Linux full gate (trmx-102) was dropped with the Linux release line.
# Mirrors the §2.2 guardrails so a `--no-verify` local bypass still fails here. See plan §8.
name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # REQUIRED seam gate (F5/F10) — platform-independent, so one standalone job (mark it required in
  # branch protection). Needs the toolchain for the cargo-tree forbidden-dependency scan.
  seam-guard:
    name: core seam guard (required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install the pinned toolchain (rust-toolchain.toml)
        run: rustup toolchain install "$(sed -nE 's/^channel = "([^"]+)".*/\1/p' rust-toolchain.toml)"
      - uses: Swatinem/rust-cache@v2
      - name: core seam guard (forbidden-dep + no platform cfg / std::os)
        run: bash scripts/check-core-seam.sh

  # trmx-99 (FR-7b): the shell-integration snippets must be shellcheck-clean and pass the source-and-assert
  # test (idempotency, hook preservation, $?-capture). ubuntu runners ship shellcheck; zsh is installed for
  # the zsh half of the test.
  shell-integration:
    name: shell integration (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install zsh (for the zsh half of the source-and-assert test)
        run: sudo apt-get update && sudo apt-get install -y zsh
      - name: shellcheck the bash snippet + the test
        run: shellcheck -s bash resources/shell-integration/termixion.bash resources/shell-integration/integration_test.sh
      - name: source-and-assert (idempotency, hook preservation, $?-capture)
        run: bash resources/shell-integration/integration_test.sh

  # REQUIRED — the platform-agnostic core must build + test headless on Linux (no platform deps).
  core-linux:
    name: core tests (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install the pinned toolchain (rust-toolchain.toml)
        run: rustup toolchain install "$(sed -nE 's/^channel = "([^"]+)".*/\1/p' rust-toolchain.toml)"
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (termixion-core)
        run: cargo test -p termixion-core --locked

  # The full macOS gate (Apple-silicon, Q1): every §2.2 guardrail plus the packaged-app end-to-end
  # `--smoke` (the authoritative E2E — Tauri has no macOS WebDriver, Risk R-3) and the Playwright webview
  # test. Cheap checks run before the heavy build so failures surface fast.
  macos:
    name: full gate (macos)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install the pinned toolchain (rust-toolchain.toml)
        run: rustup toolchain install "$(sed -nE 's/^channel = "([^"]+)".*/\1/p' rust-toolchain.toml)"
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
      - name: Bootstrap cargo-tauri (§2.4)
        run: cargo install tauri-cli --version 2.11.3 --locked

      # --- fast gates first ---
      - name: cargo fmt
        run: cargo fmt --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: pnpm lint
        run: pnpm --filter app lint
      - name: cargo test (workspace — incl. macOS PTY + integration)
        run: cargo test --workspace --locked
      - name: pnpm test (vitest)
        run: pnpm --filter app test

      # --- build + end-to-end ---
      - name: Build the packaged app (debug)
        run: cargo tauri build --debug
        working-directory: crates/termixion-tauri
      - name: Packaged app --smoke (authoritative E2E)
        run: bash scripts/smoke.sh
      - name: Install Playwright Chromium
        run: pnpm --filter app exec playwright install chromium
      - name: Playwright webview component test (dev server)
        run: pnpm --filter app test:e2e

      # --- advisory only (not a gate): NFR-2 footprint smoke ---
      - name: Footprint (advisory)
        run: du -sh target/debug/bundle/macos/Termixion.app | awk '{ print "termixion.app (debug) size:", $1 }'
