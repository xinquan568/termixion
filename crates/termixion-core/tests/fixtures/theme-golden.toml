# trmx-89 (FR-6): the golden user theme — a FULL valid theme (every required field plus a
# representative set of optionals, including rgba(...) values). Parsing this and serializing the
# resulting ThemeSpec must equal theme-golden.json (the ThemeSpec <-> tokens.ts wire-shape contract).
# Values are the `night` palette (app/src/theme/themes/night.ts).
is_dark = true

[color]
border = "#3a3f46"
selection = "rgba(90, 168, 255, 0.22)"

[color.bg]
primary = "#23262b"
secondary = "#2a2e34"
tertiary = "#32363d"

[color.text]
primary = "#d6d9de"
secondary = "#9aa0a6"
tertiary = "#6b7078"

[color.accent]
primary = "#58a6ff"
bg = "rgba(88, 166, 255, 0.12)"

[color.semantic]
error = "#f85149"
error_bg = "rgba(248, 81, 73, 0.15)"
success = "#4ade80"

[terminal]
cursor = "#d6d9de"
cursor_accent = "#23262b"
selection_background = "rgba(90, 168, 255, 0.22)"

[terminal.ansi]
black = "#1a1d22"
red = "#f85149"
green = "#3fb950"
yellow = "#d29922"
blue = "#58a6ff"
magenta = "#bc8cff"
cyan = "#39c5cf"
white = "#b1bac4"
bright_black = "#6e7681"
bright_red = "#ff7b72"
bright_green = "#56d364"
bright_yellow = "#e3b341"
bright_blue = "#79c0ff"
bright_magenta = "#d2a8ff"
bright_cyan = "#56d4dd"
bright_white = "#f0f6fc"

[terminal.scrollbar]
idle = "rgba(255, 255, 255, 0.12)"
hover = "rgba(255, 255, 255, 0.20)"
active = "rgba(255, 255, 255, 0.30)"

[terminal.pane]
active_border = "#58a6ff"
inactive_border = "#3a3f46"
