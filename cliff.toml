# git-cliff configuration (A-5). Generates CHANGELOG.md from Conventional Commits.
# Regenerate: `git cliff -o CHANGELOG.md`  (install: `cargo install git-cliff --version 2.13.1 --locked`).

[changelog]
header = """
# Changelog

All notable changes to Termixion are documented here. The format follows
[Keep a Changelog](https://keepachangelog.com), and the project adheres to
[Semantic Versioning](https://semver.org). Generated from Conventional Commits by git-cliff.
"""
body = """

{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {{ commit.message | split(pat="\n") | first | upper_first }}
{% endfor %}\
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = false
filter_commits = false
topo_order = false
sort_commits = "oldest"
commit_parsers = [
  { field = "merge_commit", pattern = "true", skip = true },
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^doc", group = "Documentation" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^test", group = "Tests" },
  { message = "^ci", group = "CI/CD" },
  { message = "^build", group = "Build" },
  { message = "^chore", group = "Chores" },
  { message = "^style", group = "Styling" },
  { body = ".*security", group = "Security" },
  { message = ".*", group = "Other" },
]
tag_pattern = "v[0-9].*"
